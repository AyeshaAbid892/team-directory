<svg width="1200" height="150" viewBox="0 0 1200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#0f1626" />
    </linearGradient>
    <linearGradient id="topLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0" />
      <stop offset="50%" stop-color="#2dd4bf" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="150" fill="url(#footerBg)" />
  <rect x="0" y="0" width="1200" height="2" fill="url(#topLine)" />

  <!-- Logo mark -->
  <rect x="80" y="52" width="34" height="34" rx="9" fill="#14b8a6" />
  <text x="97" y="75" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#06251f" text-anchor="middle">R</text>

  <text x="128" y="65" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#f4f6fa">Roster</text>
  <text x="128" y="84" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#7d859b">Built with React + Vite</text>

  <!-- Divider -->
  <line x1="330" y1="45" x2="330" y2="100" stroke="#233047" stroke-width="1" />

  <!-- Center meta -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" fill="#9aa3b8">
    <text x="360" y="65" font-weight="600" fill="#c4cbdb">Open-source starter</text>
    <text x="360" y="84">MIT licensed · production-ready component architecture</text>
  </g>

  <!-- Right-aligned tags -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600">
    <rect x="820" y="52" width="80" height="28" rx="14" fill="#141b2c" stroke="#233047" stroke-width="1" />
    <text x="860" y="70" fill="#c4cbdb" text-anchor="middle">Responsive</text>

    <rect x="912" y="52" width="76" height="28" rx="14" fill="#141b2c" stroke="#233047" stroke-width="1" />
    <text x="950" y="70" fill="#c4cbdb" text-anchor="middle">Accessible</text>

    <rect x="1000" y="52" width="120" height="28" rx="14" fill="#0e2a26" stroke="#1c4b43" stroke-width="1" />
    <text x="1060" y="70" fill="#5eead4" text-anchor="middle">v1.0.0</text>
  </g>

  <line x1="80" y1="112" x2="1120" y2="112" stroke="#182136" stroke-width="1" />
  <text x="80" y="134" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#5b6379">© 2026 Roster. Built for teams that outgrow spreadsheets.</text>
  <text x="1120" y="134" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#5b6379" text-anchor="end">Made with care</text>
</svg>
